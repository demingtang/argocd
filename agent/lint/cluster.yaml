remoteWrite:
  - url: http://cluster-victoria-metrics-cluster-vminsert.default.svc.cluster.local:8480/insert/0/prometheus/


deployment:
  enabled: true

serviceAccount:
  create: false


replicaCount: 1

service:
  enabled: false
rbac:
  create: false


env:
  - name: ENV_VAR
    value: "just make sure that env var works1112288888882"

config:
  scrape_configs:
    - job_name: Tomcat-jvm
      static_configs:
        - targets:
            - 192.168.56.101:8080
            - 192.168.56.102:8080
            - 192.168.56.103:8080                        
          labels:
            application: tomcat
            env:  staging

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2"