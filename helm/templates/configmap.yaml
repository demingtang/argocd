apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config

data:
  config.yaml: |
    global:
{{ toYaml .Values.config.global | indent 6 }}

    scrape_configs:
{{ toYaml .Values.config.scrape_configs | indent 6 }}

{{- if .Values.extraScrapeConfigs }}
{{ toYaml .Values.extraScrapeConfigs | indent 6 }}
{{- end }}