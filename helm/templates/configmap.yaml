apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  vmagent.yaml: |
    global:
      scrape_interval: {{ default "30s" .Values.config.scrape_interval }}

    scrape_configs:
    - job_name: {{ default "vmagent-job" .Values.config.job_name | quote }}
      static_configs:
      - targets:
{{ toYaml (default list .Values.config.targets) | indent 8 }}
        labels:
{{ toYaml (default dict .Values.config.labels) | indent 10 }}