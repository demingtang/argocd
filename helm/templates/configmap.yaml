apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: {{ .Values.frontend.namespace }}
data:
  vmagent.yaml: |
    global:
      scrape_interval: {{ .Values.frontend.config.scrape_interval }}

    scrape_configs:
      - job_name: '{{ .Values.frontend.config.job_name }}'
        static_configs:
          - targets:
{{- range .Values.frontend.config.targets }}
              - '{{ . }}'
{{- end }}
            labels:
{{- range $key, $value := .Values.frontend.config.labels }}
              {{ $key }}: {{ $value }}
{{- end }}