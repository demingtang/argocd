apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: {{ .Values.namespace }}
  labels:
    app: vmagent
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vmagent
  template:
    metadata:
      labels:
        app: vmagent
      annotations:
        # 可以用 ConfigMap hash 或 CI/CD 替换
        configmap-hash: "CHANGE_ME_HASH"
    spec:
      containers:
      - name: vmagent
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        args:
          - "-promscrape.config=/etc/vmagent/vmagent.yaml"
          - "-remoteWrite.url={{ .Values.remoteWriteUrl }}"
        volumeMounts:
        - name: config
          mountPath: /etc/vmagent
      volumes:
      - name: config
        configMap:
          name: vmagent-config