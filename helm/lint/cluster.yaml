remoteWrite:
  - url: http://cluster-victoria-metrics-cluster-vminsert.default.svc.cluster.local:8480/insert/0/prometheus/


deployment:
  enabled: true


replicaCount: 2

env:
  - name: ENV_VAR
    value: "just make sure that env var works111"

config:
  scrape_configs:
    - job_name: tomcat

      static_configs:
        - targets:
            - 10.0.0.1:8080
          labels:
            app: tomcat
            env: prod